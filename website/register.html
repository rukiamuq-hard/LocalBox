<!DOCTYPE html>
<html lang="ru">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register</title>
    <style>
        body {
            background-color: #00A3C4;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }

        .page-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center; 
            width: 100%;
            max-width: 320px; 
            padding: 15px;
        }

        .top-title {
            margin-top: 0;        
            margin-bottom: 20px;  
            font-size: 20px;        
            font-weight: bold;    
            color: #DCDCDC;        
            text-align: center;
            width: 100%;
             text-shadow: 
                -1px -1px 0 #2F4F4F,  
                1px -1px 0 #2F4F4F,
                -1px  1px 0 #2F4F4F,  
                1px  1px 0 #2F4F4F;
            
        }      
        .login-card {
            background-color: #666666;
            padding: 15px;
            border-radius: 10px;
            width: 100%;        
            box-sizing: border-box; 
        }

        .login-card h2 {
            margin-top: 10px;
            margin-bottom: 15px;
            color: black;
            text-align: center;
            text-shadow: 
                -0.8px -0.8px 0 #a6a6a6,  
                0.8px -0.8px 0 #a6a6a6,
                -0.8px  0.8px 0 #a6a6a6,  
                0.8px  0.8px 0 #a6a6a6;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group input {
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 7px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.9s;
        }

        .form-group input:focus {
            border-color: #B0C4DE;
        }

        .btn-submit {
            background-color: #00A3C4;
            color: black;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #00779E;
        }

        .btn-submit:active {
            transform: scale(0.99);
        }
    </style>
</head>
<body>

<div class="page-wrapper">

    <h2 class="top-title">Welcome to local cloud</h2>

    <div class="login-card">
        <h2 style="font-size:20px">Register</h2>
        
        <form class="form-group" action="/register.html" method="POST">
            <input type="text" name="login" placeholder="Name" required>
            <input type="password" name="password" placeholder="Password" required>
            
            <button type="submit" class="btn-submit">Register</button>
        </form>
    </div>

</div>

</body>
</html>
