<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Cloud - Mini Manager</title>
    <style>
        body {
            background-color: #00A3C4;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            box-sizing: border-box;
        }

        .page-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center; 
            width: 100%;
            max-width: 340px; 
            padding: 15px;
        }

        .top-title {
            margin-top: 0;        
            margin-bottom: 20px;  
            font-size: 20px;        
            font-weight: bold;    
            color: #DCDCDC;        
            text-align: center;
            width: 100%;
            text-shadow: 
                -1px -1px 0 #2F4F4F,  
                1px -1px 0 #2F4F4F,
                -1px  1px 0 #2F4F4F,  
                1px  1px 0 #2F4F4F;
        }      

        .list-card {
            background-color: #666666;
            padding: 15px;
            border-radius: 10px;
            width: 100%;        
            box-sizing: border-box; 
            max-height: 70vh;       
            overflow-y: auto;       
            display: flex;
           flex-direction: column;
        }

        .list-card h2 {
            margin-top: 5px;
            margin-bottom: 15px;
            color: black;
            text-align: center;
            text-shadow: 
                -0.8px -0.8px 0 #a6a6a6,  
                0.8px -0.8px 0 #a6a6a6,
                -0.8px  0.8px 0 #a6a6a6,  
                0.8px  0.8px 0 #a6a6a6;
        }

        .control-panel {
            display: flex;
            justify-content: space-between;
            gap: 5px;
            margin-bottom: 15px;
        }

        .btn-action, .label-upload {
            background-color: #00A3C4;
            color: black;
            border: none;
            padding: 8px 10px;
            border-radius: 7px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            flex: 1;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        .btn-action:hover, .label-upload:hover {
            background-color: #00779E;
        }

        .btn-action:active, .label-upload:active {
            transform: scale(0.97);
        }

        .hidden-input {
            display: none;
        }

        #path {
            margin-bottom: 15px;
            font-weight: bold;
            font-size: 13px;
            color: #DCDCDC;
            word-break: break-all;
            background-color: #2F4F4F;
            padding: 6px 10px;
            border-radius: 5px;
        }

        #files {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: flex-start;
        }

        .item {
            width: 90px;
            height: 90px;
            background-color: white;
            border: 1px solid #ccc;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
            border-radius: 7px;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            padding: 5px;
            box-sizing: border-box;
            word-break: break-word;
            transition: transform 0.1s, border-color 0.3s;
        }

        .item:active {
            transform: scale(0.95);
        }

        .folder {
            border-color: #ffe680;
            color: #b38f00;
        }

        .file {
            border-color: #bde0ff;
            color: #0066cc;
        }

        .over {
            outline: 3px solid #00A3C4;
        }

        .list-card::-webkit-scrollbar {
            width: 6px;
        }
        .list-card::-webkit-scrollbar-track {
            background: transparent;
        }
        .list-card::-webkit-scrollbar-thumb {
            background-color: #00A3C4;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="page-wrapper">

    <h2 class="top-title">Welcome!</h2>

    <div class="list-card">
        <h2>Cloud Manager</h2>
        
        <div class="control-panel">
            <button class="btn-action" onclick="newFolder()">+ Folder</button>
            
            <label class="label-upload">
                + Upload
                <input type="file" class="hidden-input" id="fileUpload" onchange="handleFileUpload(this)">
            </label>
            
            <button class="btn-action" onclick="back()">🛈 Back</button>
        </div>

        <div id="path"></div>
        <div id="files"></div>
    </div>

</div>

<script>
const root={
    name:"root",
    type:"folder",
    children:[]
};

let current=root;
let stack=[];

const TREE_STORAGE_KEY="cloudManagerTree";

function generateId(){
    if(window.crypto && typeof window.crypto.randomUUID==="function"){
        return window.crypto.randomUUID();
    }
    // Fallback for non-secure contexts (plain http, no SSL) where
    // crypto.randomUUID is not available
    return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, function(c){
        const r = Math.random()*16|0;
        const v = c=="x" ? r : (r&0x3|0x8);
        return v.toString(16);
    });
}

function saveTree(){
    try{
        localStorage.setItem(TREE_STORAGE_KEY, JSON.stringify(root.children));
    }catch(e){
        console.error(e);
    }
}

function loadTree(){
    try{
        const raw=localStorage.getItem(TREE_STORAGE_KEY);
        if(raw){
            root.children=JSON.parse(raw);
        }
    }catch(e){
        console.error(e);
        root.children=[];
    }
}

function findFileNode(node,id){
    for(const child of node.children){
        if(child.type=="file" && child.id==id) return child;
        if(child.type=="folder"){
            const r=findFileNode(child,id);
            if(r) return r;
        }
    }
    return null;
}

function removeMissingFiles(node,serverIds){
    node.children=node.children.filter(child=>{
        if(child.type=="file"){
            return serverIds.has(child.id);
        }
        if(child.type=="folder"){
            removeMissingFiles(child,serverIds);
        }
        return true;
    });
}

async function loadFiles() {
    try {
        const response = await fetch("/api/files");

        if (!response.ok) {
            throw new Error("Ошибка получения файлов");
        }

        const data = await response.json();

        // Restore folder structure + previous file placements from this browser
        loadTree();

        const serverIds=new Set(data.map(f=>f.id));

        // Drop files that no longer exist on the server (deleted elsewhere)
        removeMissingFiles(root,serverIds);

        // Add new files / refresh metadata for existing ones, keeping their folder
        data.forEach(file => {
            const existing=findFileNode(root,file.id);
            if(existing){
                existing.name=file.name;
                existing.date=file.date;
                existing.size=file.size;
            } else {
                root.children.push({
                    id: file.id,
                    name: file.name,
                    type: "file",
                    date: file.date,
                    size: file.size
                });
            }
        });

        saveTree();

        current = root;
        stack = [];

        render();

    } catch (err) {
        console.error(err);
    }
}

function render(){
    path.textContent="Path: /" + stack.map(x=>x.name).join("/");
    files.innerHTML="";

    current.children.forEach(item=>{
        const div=document.createElement("div");
        div.className="item "+item.type;
        div.textContent=(item.type=="folder"?"📁":"📄")+" "+item.name;
        div.draggable=true;

        div.onclick=()=>{
            if(item.type=="folder"){
                stack.push(item);
                current=item;
                render();
            } else if(item.type=="file") {
                downloadFile(item);
            }
        };

        div.ondragstart=e=>{
            e.dataTransfer.setData("id",item.id);
        };

        if(item.type=="folder"){
            div.ondragover=e=>{
                e.preventDefault();
                div.classList.add("over");
            };

            div.ondragleave=()=>{
                div.classList.remove("over");
            };

            div.ondrop=e=>{
                e.preventDefault();
                e.stopPropagation();
                div.classList.remove("over");

                if(e.dataTransfer.files && e.dataTransfer.files.length){
                    uploadFilesToFolder(e.dataTransfer.files, item);
                    return;
                }

                const id=e.dataTransfer.getData("id");
                if(id==item.id)return;

                move(id,item);
                saveTree();
                render();
            };
        }
        files.appendChild(div);
    });
}

function newFolder(){
    let folderName = prompt("Enter folder name:", "New Folder");
    if (folderName === null) return;
    folderName = folderName.trim() || "New Folder";

    current.children.push({
        id:generateId(),
        name: folderName,
        type:"folder",
        children:[]
    });
    saveTree();
    render();
}

function getAllFileIds(node, acc){
    acc = acc || new Set();
    for(const child of node.children){
        if(child.type=="file") acc.add(child.id);
        else if(child.type=="folder") getAllFileIds(child, acc);
    }
    return acc;
}

async function uploadFileToFolder(fileData, folder){
    const formData = new FormData();
    formData.append("file", fileData);

    try {
        // Files already known to us before this upload, so we can spot the new one
        const knownIds = getAllFileIds(root);

        const response = await fetch("/api/files", {
            method: "POST",
            body: formData
        });

        if (!response.ok) {
            throw new Error("Error loading file");
        }

        // The upload endpoint doesn't return the file's id/metadata,
        // so re-fetch the full list and pick out the entry that wasn't there before
        const listResponse = await fetch("/api/files");
        if(!listResponse.ok){
            throw new Error("Error refreshing file list");
        }
        const freshFiles = await listResponse.json();

        const newFile =
            freshFiles.find(f => !knownIds.has(f.id) && f.name === fileData.name) ||
            freshFiles.find(f => !knownIds.has(f.id));

        if(newFile){
            folder.children.push({
                id: newFile.id,
                name: newFile.name,
                type: "file",
                date: newFile.date,
                size: newFile.size
            });
        } else {
            console.error("Uploaded file not found in refreshed list", fileData.name);
        }
    } catch (err) {
        console.error(err);
        alert("Can`t load file: " + fileData.name);
    }
}

async function uploadFilesToFolder(fileList, folder){
    for(const fileData of Array.from(fileList)){
        await uploadFileToFolder(fileData, folder);
    }
    saveTree();
    render();
}

async function handleFileUpload(input) { //FILE UPLOAD
    if (!input.files || !input.files[0]) return;
    await uploadFilesToFolder(input.files, current);
    input.value = "";
}

function downloadFile(item) {
    window.location.href = "/download/" + item.id;
}

function back(){
    if(stack.length){
        stack.pop();
        current=stack.length?stack[stack.length-1]:root;
        render();
    }
}

function removeFrom(folder,id){
    for(let i=0;i<folder.children.length;i++){
        let x=folder.children[i];
        if(x.id==id){
            folder.children.splice(i,1);
            return x;
        }
        if(x.type=="folder"){
            let r=removeFrom(x,id);
            if(r)return r;
        }
    }
}

function move(id,target){
    let obj=removeFrom(root,id);
    if(obj)
        target.children.push(obj);
}

files.ondragover = e => {
    e.preventDefault();
};

files.ondrop = e => {
    e.preventDefault();
    e.stopPropagation();
    if(e.dataTransfer.files && e.dataTransfer.files.length){
        uploadFilesToFolder(e.dataTransfer.files, current);
    }
};

// Safety net: browsers navigate away and OPEN the dropped file if a
// drag/drop event isn't explicitly handled and prevented. This guarantees
// that dropping a file ANYWHERE on the page never hijacks navigation, even
// on padding, headers, or empty space outside the file list.
document.addEventListener("dragover", e => {
    e.preventDefault();
});

document.addEventListener("drop", e => {
    e.preventDefault();
    if(e.dataTransfer.files && e.dataTransfer.files.length){
        uploadFilesToFolder(e.dataTransfer.files, current);
    }
});

loadFiles();
</script>

</body>
</html>
